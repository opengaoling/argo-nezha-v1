upstream dashboard {
    # 关键修改：强制使用 127.0.0.1，避免 [::1] 拒绝连接
    server 127.0.0.1:8008;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on; 
    access_log off;
    error_log /var/log/nginx/error.log warn;

    server_name $ARGO_DOMAIN; 
    ssl_certificate      /dashboard/nezha.pem; 
    ssl_certificate_key  /dashboard/nezha.key; 
    
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m; 
    ssl_protocols TLSv1.2 TLSv1.3;

    underscores_in_headers on;
    set_real_ip_from 0.0.0.0/0; 
    real_ip_header CF-Connecting-IP; 

    # gRPC 相关 - 哪吒监控通信
    location ^~ /proto.NezhaService/ {
        # 即使 upstream 叫 dashboard，这里显式写明 grpc 协议
        grpc_pass grpc://dashboard;

        grpc_set_header Host $host;
        # 修正：变量名通常不区分大小写，但规范建议与 header 一致
        grpc_set_header nz-realip $http_cf_connecting_ip; 
        
        grpc_read_timeout 600s;
        grpc_send_timeout 600s;
        grpc_socket_keepalive on;
        client_max_body_size 10m;
        grpc_buffer_size 4m;
    }

    # WebSocket 相关
    location ~* ^/api/v1/ws/(server|terminal|file)(.*)$ {
        proxy_pass http://127.0.0.1:8008; # 这里也建议改用 127.0.0.1
        proxy_set_header Host $host;
        proxy_set_header nz-realip $http_cf_connecting_ip; 
        proxy_set_header Origin https://$host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # 外置前台静态资源。直接从挂载目录读取，避免 app 启动时生成的 debug 资源映射
    # 和上游/CDN 缓存导致 JS/CSS 返回空内容或错误 MIME。
    location ~ ^/assets/(.+)\.debug-[^.]+(\.[^./]+)$ {
        alias /dashboard/user-dist/assets/$1$2;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location /assets/ {
        alias /dashboard/user-dist/assets/;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location = /apple-touch-icon.png {
        alias /dashboard/user-dist/apple-touch-icon.png;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # 外置后台静态资源。
    location ~ ^/dashboard/assets/(.+)\.debug-[^.]+(\.[^./]+)$ {
        alias /dashboard/admin-dist/assets/$1$2;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location /dashboard/assets/ {
        alias /dashboard/admin-dist/assets/;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location = /dashboard/logo.svg {
        alias /dashboard/admin-dist/logo.svg;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Web 页面
    location / {
        proxy_pass http://127.0.0.1:8008; # 这里也建议改用 127.0.0.1
        proxy_set_header Host $host;
        proxy_set_header nz-realip $http_cf_connecting_ip; 
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        proxy_max_temp_file_size 0;
    }
}

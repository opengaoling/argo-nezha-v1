name: build-docker-image

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  DOCKER_IMAGE_NAME: "argo-nezha-v1"
  PANEL_REPO: "opengaoling/nezha-geoip-panel"
  PANEL_IMAGE_NAME: "nezha-geoip-panel"
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

concurrency:
  group: build-docker-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Get panel image ref
        id: panel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PANEL_SHA=""
          for attempt in 1 2 3 4 5; do
            PANEL_SHA=$(curl -fsSL \
              --retry 3 \
              --retry-delay 5 \
              --retry-all-errors \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              https://api.github.com/repos/${{ env.PANEL_REPO }}/commits/master | jq -r '.sha // empty') && break
            sleep $((attempt * 5))
          done
          if [ -z "$PANEL_SHA" ]; then
            echo "Failed to resolve panel commit SHA" >&2
            exit 1
          fi
          PANEL_TAG=$(echo "$PANEL_SHA" | cut -c1-7)
          PANEL_IMAGE="ghcr.io/${{ github.repository_owner }}/${{ env.PANEL_IMAGE_NAME }}:${PANEL_TAG}"
          echo "Panel image ref: $PANEL_IMAGE"
          echo "panel_sha=$PANEL_SHA" >> $GITHUB_OUTPUT
          echo "panel_tag=$PANEL_TAG" >> $GITHUB_OUTPUT
          echo "panel_image=$PANEL_IMAGE" >> $GITHUB_OUTPUT

      - name: Pre-pull BuildKit image
        run: |
          for attempt in 1 2 3 4 5; do
            if docker pull moby/buildkit:buildx-stable-1; then
              exit 0
            fi
            sleep $((attempt * 10))
          done
          docker pull moby/buildkit:buildx-stable-1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:buildx-stable-1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PANEL_IMAGE=${{ steps.panel.outputs.panel_image }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Argo Nezha V1 with customized GeoIP dashboard
            org.opencontainers.image.base.name=${{ steps.panel.outputs.panel_image }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.DOCKER_IMAGE_NAME }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ env.DOCKER_IMAGE_NAME }}:${{ steps.panel.outputs.panel_tag }}

      - name: Send Telegram notification
        if: ${{ env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != '' }}
        env:
          DOCKER_IMAGE_URL: https://github.com/${{ github.repository }}/pkgs/container/${{ env.DOCKER_IMAGE_NAME }}
        run: |
          MESSAGE="新的 ${{ env.DOCKER_IMAGE_NAME }} 镜像已推送 🚀%0A%0A"
          MESSAGE+="面板镜像版本: ${{ steps.panel.outputs.panel_tag }}%0A"
          MESSAGE+="镜像地址: $DOCKER_IMAGE_URL"
          curl -s -X POST "https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ env.TELEGRAM_CHAT_ID }}" \
            -d text="$MESSAGE"

  cleanup-runs:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 7
          keep_minimum_runs: 6
